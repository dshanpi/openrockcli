name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libusb-1.0-0-dev

      - name: Build
        run: |
          make clean
          make
          strip openrockcli
          ./openrockcli --version

      - name: Package
        run: |
          set -eux
          name="openrockcli-linux-x86_64"
          mkdir -p "dist/${name}"
          cp openrockcli README.md LICENSE 99-openrockcli.rules "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          sha256sum "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openrockcli-linux-x86_64
          path: |
            dist/openrockcli-linux-x86_64.tar.gz
            dist/openrockcli-linux-x86_64.tar.gz.sha256

  windows:
    name: Windows x86_64
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            make
            pkgconf
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-libusb

      - name: Build
        run: |
          make clean
          make NAME=openrockcli.exe
          strip openrockcli.exe
          ./openrockcli.exe --version

      - name: Stage package
        run: |
          set -eux
          name="openrockcli-windows-x86_64"
          mkdir -p "dist/${name}"
          cp openrockcli.exe README.md LICENSE "dist/${name}/"
          ldd openrockcli.exe |
            awk '/msys64/ { print $3 }' |
            sort -u |
            while read -r dll; do
              [ -n "${dll}" ] && cp "${dll}" "dist/${name}/"
            done

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/openrockcli-windows-x86_64 -DestinationPath dist/openrockcli-windows-x86_64.zip
          Get-FileHash dist/openrockcli-windows-x86_64.zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  openrockcli-windows-x86_64.zip" } |
            Set-Content dist/openrockcli-windows-x86_64.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openrockcli-windows-x86_64
          path: |
            dist/openrockcli-windows-x86_64.zip
            dist/openrockcli-windows-x86_64.zip.sha256

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.CI_GITHUB }}
        with:
          files: |
            dist/openrockcli-linux-x86_64.tar.gz
            dist/openrockcli-linux-x86_64.tar.gz.sha256
            dist/openrockcli-windows-x86_64.zip
            dist/openrockcli-windows-x86_64.zip.sha256
          generate_release_notes: true
